<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ノボリコタン 〜自然と共につくる村〜</title>
    <style>
        /* 背景画像の設定 */
        body {
            margin: 0;
            padding: 0;
            background-image: url('bg-ac.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif;
            color: #5c4b3c;
        }

        /* 画面全体を覆うコンテナ */
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* あつ森風の掲示板・看板スタイル */
        .board {
            background-color: rgba(253, 250, 240, 0.92);
            border: 8px solid #f1e9d2;
            border-radius: 50px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-size: 2.5rem; color: #5ead45; margin-bottom: 10px; }
        h2 { border-bottom: 3px dashed #5ead45; display: inline-block; padding-bottom: 5px; margin-bottom: 25px; }

        /* 動画の枠 */
        .video-frame {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 25px;
            overflow: hidden;
            border: 6px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .video-frame iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* ボタン（あつ森のUI風） */
        .btn {
            display: inline-block;
            background: #5ead45;
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 0 #4a8a36;
            margin: 10px;
            transition: 0.2s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #4a8a36; }

        /* Notion風のリストを整理 */
        .link-list {
            text-align: left;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
        }
        .link-list a { color: #5ead45; text-decoration: none; font-weight: bold; display: block; margin: 10px 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="board">
        <h1>ノボリコタン 第2章</h1>
        <p>〜 自然と共に、村を作る記録 〜</p>
        
        <div class="link-list">
            <a href="#">🍃 ノボリコタン 0章はこちらから</a>
            <a href="#">🍃 ノボリコタン 1章はこちらから</a>
        </div>
    </div>

    <div class="board">
        <h2>🎥 第2章ダイジェスト</h2>
        <div class="video-frame">
            <iframe src="https://www.youtube.com/embed/nvt2u6SIMCI" frameborder="0" allowfullscreen></iframe>
        </div>
        <p style="margin-top:20px;">活動の様子を動画でチェックしてね！</p>
        <a href="https://youtu.be/Vxak_8KU10c" class="btn">第1章をおさらいする</a>
    </div>

    <div class="board">
        <h2>🏡 むらの場所</h2>
        <p>北海道余市町に広がる、私たちの開拓地です。</p>
        <a href="https://www.google.co.jp/maps/place/ノボリコタン/" class="btn" style="background:#e67e22; box-shadow:0 5px 0 #c36a1c;">Googleマップで見る</a>
    </div>
</div>

</body>
</html>
