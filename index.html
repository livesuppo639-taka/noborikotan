<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ノボリコタン 公式ホームページ</title>
    <style>
        :root { --primary-color: #2d5a27; --accent-color: #e67e22; --bg-color: #fdfaf5; --text-color: #333; }
        body { font-family: sans-serif; line-height: 1.6; color: var(--text-color); background-color: var(--bg-color); margin: 0; padding: 0; }
        header { background-color: var(--primary-color); color: white; padding: 2rem 1rem; text-align: center; }
        nav { background: #fff; padding: 10px; text-align: center; position: sticky; top: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav a { margin: 0 15px; text-decoration: none; color: var(--primary-color); font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 20px 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        h2 { border-left: 5px solid var(--primary-color); padding-left: 10px; color: var(--primary-color); }
        footer { text-align: center; padding: 20px; background: #333; color: white; margin-top: 40px; }
    </style>
</head>
<body>
<header>
    <h1>ノボリコタン</h1>
    <p>協生農法・アースバッグ・自然とつながる学びの場</p>
</header>
<nav>
    <a href="#about">動画</a> <a href="#history">活動</a> <a href="#access">場所</a>
</nav>
<div class="container">
    <section id="about">
        <h2>最新の活動ダイジェスト</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/nvt2u6SIMCI" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>
    <section id="history">
        <h2>活動スケジュール</h2>
        <ul>
            <li>現地ワーク進行中！</li>
            <li>詳細はオープンチャットにて配信。</li>
        </ul>
    </section>
</div>
<footer><p>© 2026 ノボリコタン</p></footer>
</body>
</html>
